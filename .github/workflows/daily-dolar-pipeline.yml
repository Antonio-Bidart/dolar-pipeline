# Runs the portfolio automation pipeline on demand and on business days.
name: Daily Dolar Pipeline

on:
  workflow_dispatch:
  schedule:
    # 12:00 UTC = 09:00 Argentina.
    - cron: "0 12 * * 1-5"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      PYTHONPATH: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Execute pipeline
        run: python -m dolar_pipeline run

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dolar-pipeline-artifacts
          path: |
            data/latest_rates.csv
            data/latest_report.html
            data/dolar_rates.sqlite
            logs/runs.ndjson

      - name: Prepare GitHub Pages site
        run: |
          mkdir -p public
          cp data/latest_report.html public/index.html
          cp data/latest_rates.csv public/latest_rates.csv
          cp logs/runs.ndjson public/runs.ndjson

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
